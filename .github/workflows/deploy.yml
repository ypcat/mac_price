name: Daily Mac Price Scraper & Deploy

on:
  schedule:
    - cron: '0 0 0 * *' # Run weekly
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Crawler
        run: node crawler.js

      - name: Commit & Push updated data
        run: |
          git config --global user.name "Antigravity Agent"
          git config --global user.email "antigravity-agent-bot@users.noreply.github.com"
          git add mac_configs.json index.html
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update Mac configurations and dashboard [skip ci]"
            git push
          else
            echo "No changes in Mac configurations detected."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
